name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    # 24.04 ships the C++23 toolchains AeroEdge + QuarkCpp need (std::expected, deducing-this):
    # g++-14 and clang-18 from the default repos. ubuntu-latest's defaults are too old.
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # Toolchains match the verified local set: g++-14 and clang-20 (from apt.llvm.org). clang is
        # pointed at gcc-14's libstdc++ (which provides <expected>) via --gcc-install-dir; older clang
        # + gcc-14 headers do not compile, and Quark is only verified on clang-20.
        include:
          - { compiler: g++-14,     build_type: Release, sanitizer: "",                 stdlib: "" }
          - { compiler: g++-14,     build_type: Debug,   sanitizer: "address,undefined", stdlib: "" }
          - { compiler: g++-14,     build_type: Debug,   sanitizer: "thread",            stdlib: "" }
          - { compiler: clang++-20, build_type: Release, sanitizer: "",                 stdlib: "--gcc-install-dir=/usr/lib/gcc/x86_64-linux-gnu/14" }
          - { compiler: clang++-20, build_type: Debug,   sanitizer: "address,undefined", stdlib: "--gcc-install-dir=/usr/lib/gcc/x86_64-linux-gnu/14" }
          - { compiler: clang++-20, build_type: Debug,   sanitizer: "thread",            stdlib: "--gcc-install-dir=/usr/lib/gcc/x86_64-linux-gnu/14" }
    name: ${{ matrix.compiler }} ${{ matrix.sanitizer == '' && 'release' || matrix.sanitizer }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: AeroEdge
      # AeroEdge expects QuarkCpp as a sibling checkout (../QuarkCpp), or set -DQUARK_DIR.
      - name: Checkout QuarkCpp
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/QuarkCpp
          path: QuarkCpp
      - name: Install toolchain
        # g++-14 provides libstdc++-14 (which clang uses for <expected>); clang-20 from apt.llvm.org
        # (matches the verified local toolchain); ninja for the -G Ninja build.
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-14 lsb-release wget software-properties-common gnupg
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
      # uv hosts the real MQTT (amqtt) + gRPC (grpcio) backends the transport gates exercise. Installed
      # BEFORE Configure so find_program(uv) locates it; without it those two tests skip cleanly instead.
      - name: Install uv (real MQTT/gRPC transport backends)
        uses: astral-sh/setup-uv@v5
      - name: Configure
        working-directory: AeroEdge
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
          -DCMAKE_CXX_FLAGS="${{ matrix.stdlib }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.stdlib }}"
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DAEROEDGE_SANITIZER="${{ matrix.sanitizer }}"
          -DQUARK_DIR=${{ github.workspace }}/QuarkCpp
      - name: Build
        working-directory: AeroEdge
        run: cmake --build build -j
      - name: Test
        working-directory: AeroEdge
        run: ctest --test-dir build --output-on-failure

  studio:
    name: studio (web)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: studio/package-lock.json
      - name: Install
        working-directory: studio
        run: npm ci
      - name: Test (vitest)
        working-directory: studio
        run: npm test -- --run
      - name: Build (tsc + vite)
        working-directory: studio
        run: npm run build
